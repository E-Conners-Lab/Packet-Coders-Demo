# Packet Coders MCP demo — Containerlab topology
#
# Three Arista cEOS nodes: two edge routers (r1, r2) each peered with a spine
# (spine1) over OSPF area 0 and eBGP. Management IPs match
# configs/inventory.containerlab.example.yaml so the MCP server can reach them.
#
# Why cEOS and not FRR: the MCP server talks to nodes over SSH (Netmiko). cEOS
# has a real SSH server and IOS-style `show` commands that match the server's
# command map out of the box. FRR-over-SSH needs a custom image with sshd + vtysh
# permissions, which is fragile for a live demo.
#
# Prerequisites
#   1. Docker and containerlab (>= 0.50 recommended).
#   2. A cEOS image imported and tagged (free Arista account), on an x86_64 Linux
#      host (cEOS is x86_64-only; it will not run on Apple Silicon):
#        docker import cEOS-lab-4.35.1F.tar.xz ceos:4.35.1F
#      Then set the `image:` tag below to match your import.
#
# Deploy / destroy
#   sudo containerlab deploy  -t clab/ai.clab.yml
#   sudo containerlab destroy -t clab/ai.clab.yml
#
# Container names become clab-ai-<node> (e.g. clab-ai-r1), matching the inventory
# device names. First cEOS boot takes ~1-2 minutes before SSH and the routing
# protocols are up — give it a moment before running the MCP tools.

name: ai

mgmt:
  ipv4-subnet: 172.20.20.0/24

topology:
  kinds:
    ceos:                          # newer containerlab also accepts `arista_ceos`
      image: ceos:4.35.1F          # <-- set to your imported cEOS tag

  nodes:
    r1:
      kind: ceos
      mgmt-ipv4: 172.20.20.11
      startup-config: configs/r1.cfg
    r2:
      kind: ceos
      mgmt-ipv4: 172.20.20.12
      startup-config: configs/r2.cfg
    spine1:
      kind: ceos
      mgmt-ipv4: 172.20.20.21
      startup-config: configs/spine1.cfg

  links:
    - endpoints: ["r1:eth1", "spine1:eth1"]
    - endpoints: ["r2:eth1", "spine1:eth2"]
