! r2 — edge router, AS 65002
! Login for the MCP server (Netmiko arista_eos): admin / admin
hostname r2
!
username admin privilege 15 role network-admin secret admin
!
service routing protocols model multi-agent
!
ip routing
!
interface Loopback0
   ip address 10.255.0.2/32
!
interface Ethernet1
   no switchport
   ip address 10.0.20.2/24
!
router ospf 1
   router-id 10.255.0.2
   network 10.0.20.0/24 area 0.0.0.0
   network 10.255.0.2/32 area 0.0.0.0
!
router bgp 65002
   router-id 10.255.0.2
   neighbor 10.0.20.10 remote-as 65000
   network 10.255.0.2/32
   !
   address-family ipv4
      neighbor 10.0.20.10 activate
!
end
