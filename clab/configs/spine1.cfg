! spine1 — spine, AS 65000, peers with r1 (65001) and r2 (65002)
! Login for the MCP server (Netmiko arista_eos): admin / admin
hostname spine1
!
username admin privilege 15 role network-admin secret admin
!
service routing protocols model multi-agent
!
ip routing
!
interface Loopback0
   ip address 10.255.0.10/32
!
interface Ethernet1
   no switchport
   ip address 10.0.10.10/24
!
interface Ethernet2
   no switchport
   ip address 10.0.20.10/24
!
router ospf 1
   router-id 10.255.0.10
   network 10.0.10.0/24 area 0.0.0.0
   network 10.0.20.0/24 area 0.0.0.0
   network 10.255.0.10/32 area 0.0.0.0
!
router bgp 65000
   router-id 10.255.0.10
   neighbor 10.0.10.1 remote-as 65001
   neighbor 10.0.20.2 remote-as 65002
   network 10.255.0.10/32
   !
   address-family ipv4
      neighbor 10.0.10.1 activate
      neighbor 10.0.20.2 activate
!
end
